    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Tailwind CSS -->

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"DM Sans"', 'sans-serif'],
              serif: ['"Instrument Serif"', 'serif'],

            colors: {
              'bg-weak-50': '#FBFBFB',
              'bg-white': '#FFFFFF',

      }
